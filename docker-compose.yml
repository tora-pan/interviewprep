services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./services/api-python:/app
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/interviewprep
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: interviewprep
    ports:
      - "5432:5432"